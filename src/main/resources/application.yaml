spring:
  application:
    name: analise_gastos

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update

  ai:
    openai:
      api-key: ${OPEN_AI_API_KEY}

resilience4j:
  ratelimiter:
    instances:
      openai:
        limitForPeriod: 3
        limitRefreshPeriod: 1m
        timeoutDuration: 0